<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller 3</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
</head>
<body>
    <section>
        <div>
            <label for="pokemons">ELige tu Pokemón</label>
            <select id="pokemons" onchange="pokemonSelected(this.value)">
            <option value="">Select a Pokemon</option>
        </select>
        </div>

        <div id="pokemon-info">
            <div id="pokemon-header">
                <h1 id="pokemon-name"></h1>
                <div id="pokemon-image-wrap">
                    <img id="pokemon-image" alt="Imagen del Pokémon" />
                </div>
            </div>
            <h2 id="pokemon-abilities-title">Habilidades</h2>
            <div id="pokemon-abilities"></div>

            <ul id="pokemon-stats"></ul>
        </div>
    </section>
</body>
</html>
